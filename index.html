
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>СЮРПРИЗ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial Black, sans-serif;
            overflow: hidden;
            transition: background 0.05s;
        }

        .btn {
            display: inline-block;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }
        .btn img {
            width: 300px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        .btn:hover {
            transform: scale(1.1);
        }

        .scare-text {
            display: none;
            font-size: 120px;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 50px #ff0000, 0 0 100px #ff0000;
            text-align: center;
            position: fixed;
            z-index: 20;
            animation: pulse 0.2s infinite alternate;
            user-select: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            z-index: 30;
            display: none;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .scare-text { font-size: 60px; }
            .btn img { width: 200px; }
        }
    </style>
</head>
<body>

    <div class="btn" id="clickBtn">
        <img src="https://via.placeholder.com/300x150/333/fff?text=НАЖМИ+СЮДА" alt="Нажми сюда">
    </div>

    <div class="scare-text" id="scareText">
        ОБЕРНИСЬ
    </div>

    <div class="flash" id="flashLayer"></div>

    <script>
        const btn = document.getElementById('clickBtn');
        const scareText = document.getElementById('scareText');
        const flashLayer = document.getElementById('flashLayer');

        btn.addEventListener('click', function() {

            const audio = new Audio('https://www.myinstants.com/media/sounds/scream-sound-effect.mp3');
            audio.volume = 1;
            audio.play();

            btn.style.display = 'none';

            scareText.style.display = 'block';

            flashLayer.style.display = 'block';
            let flashCount = 0;
            const flashInterval = setInterval(function() {
                if (flashCount % 2 === 0) {
                    flashLayer.style.background = 'red';
                } else {
                    flashLayer.style.background = 'black';
                }
                flashCount++;
                if (flashCount >= 20) {
                    clearInterval(flashInterval);
                    flashLayer.style.display = 'none';
                }
            }, 100);

            setTimeout(() => {
                audio.play().catch(() => {});
            }, 100);

        });
    </script>

</body>
